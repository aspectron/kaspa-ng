[workspace]
resolver = "2"
members = [
    "app",
    "core",
    "macros",
    "extensions/chrome",
]
default-members = ["app"]

[workspace.package]
rust-version = "1.91.0"
version = "2.0.1"
authors = ["ASPECTRON Inc.","Kaspa Developers"]
license = "PROPRIETARY"
edition = "2024"
repository = "https://github.com/aspectron/kaspa-ng"

[workspace.dependencies]

kaspa-ng = { version = "2.0.1", path = "app/", default-features = false }
kaspa-ng-core = { version = "2.0.1", path = "core/", default-features = false }
kaspa-ng-macros = { version = "2.0.1", path = "macros/", default-features = false }

# ___________________
#  ____ ____ _  _ _ 
