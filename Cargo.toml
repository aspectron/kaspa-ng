workflow-core = "0.19.0"
workflow-i18n = "0.19.0"
workflow-chrome = "0.19.0"
workflow-dom = "0.19.0"
workflow-log = "0.19.0"
workflow-store = "0.19.0"
workflow-wasm = "0.19.0"
# `default-features = false` + `rustls-no-provider` so reqwest does not pull the
# aws-lc-rs crypto provider (C/cmake); the pure-Rust `ring` provider is installed
# at startup (app main + the wRPC SDK). Mirrors rusty-kaspa's declaration.
workflow-http = { version = "0.19.0", default-features = false, features = ["rustls-no-provider", "http2", "charset", "system-proxy"] }

