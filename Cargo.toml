ahash = "0.8.12"
async-trait = "0.1.89"
borsh = { version = "1.7.0", features = ["derive", "rc"] }
cfg-if = "1.0.4"
chrome-sys = "0.2.0"
# chrome-sys = {path = "../chrome-sys"}
chrono = "0.4.45"
clap = { version = "4.6.1", features = ["derive", "string", "cargo"] }
convert_case = "0.11.0"
crypto_box = { version = "0.9.1", features = ["chacha20"] }
ctrlc = { version = "3.5", features = ["termination"] }
derivative = "2.2.0"
downcast = "0.11.0"
downcast-rs = "2.0.2"
env_logger = "0.11"
futures = { version = "0.3.32" }
futures-util = { version = "0.3.32", default-features = false, features = ["alloc"] }
image = { version = "0.25.10", default-features = false, features = ["png"] }
js-sys = "0.3.103"
log = "0.4.33"
nix = { version = "0.31.3", features = ["signal"]}
num_cpus = "1.17.0"
open = "5.3.5"
pad = "0.1.6"
passwords = "3.1.16"
qrcode = "0.14.1"
rand = "0.10.1"
rfd = "0.17.2"
ritehash = "0.2.0"
rlimit = "0.11.0"
separator = "0.4.1"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
serde_json = "1.0.150"
slug = "0.1.6"
smallvec = { version = "1.15.2", features = ["serde"] }
sysinfo = "0.39.5"
thiserror = "2.0.18"
tokio = { version = "1", features = ["sync", "rt-multi-thread", "process"] }
toml = "1.1.2"
walkdir = "2.5.0"
wasm-bindgen = "0.2.126"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3.103", features = ['Window'] }
xxhash-rust = { version = "0.8.15", features = ["xxh3"] }
zeroize = { version = "1", default-features = false, features = ["alloc"] }

[profile.release]
opt-level = 2
# lto = true
# opt-level = 3

[profile.native-release]
inherits = "release"
opt-level = 3
# lto = true
# strip = true

[profile.console]
inherits = "release"
opt-level = 2
strip = false
# lto = true
# strip = true
