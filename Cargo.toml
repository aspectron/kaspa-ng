egui = "=0.34.3"
epaint = "=0.34.3"
egui_plot = "=0.35.0"
egui_extras = { version = "=0.34.3", features = ["svg","image"] }
eframe = { version = "=0.34.3",  default-features = false, features = [
    "accesskit",     # Make egui comptaible with screen readers. NOTE: adds a lot of dependencies.
    "default_fonts", # Embed the default egui fonts.
    "glow",          # Use the glow rendering backend. Alternative: "wgpu".
    "x11",           # Linux X11 backend (winit errors with no backend selected when default-features = false).
    "wayland",       # Linux Wayland backend.
    "persistence",   # Enable restoring app state when restarting the app.
] }

egui-phosphor = { version = "=0.12.0", features = ["thin","light","regular","bold"] }
egui-notify = { version = "=0.22.0"}


